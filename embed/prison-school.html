<html>
 <head>
  <meta charset="UTF-8"/>
  <title>Prison School | embed</title>
  <link rel="icon" type="image/ico" href="/favicon.ico" />
<!-- Привет, Ты милый ^.^ -->
 </head>
 <body bgcolor="#000000">
<script>
        (async function () {
            let country_code = null;

            try {
                const response = await fetch('https://free.freeipapi.com/api/json', {
                    method: 'GET',
                    mode: 'cors',
                    cache: 'no-cache'
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data.countryCode) {
                        country_code = data.countryCode;
                    }
                }
            } catch (error) {
                console.warn('Не удалось определить страну:', error);
            }

            if (country_code === 'RU') {
                document.open();
                document.write(`
                    <!doctype html>
                    <html>
                    <head>
						<meta charset="utf-8">
						<meta http-equiv="X-UA-Compatible" content="IE=edge">
						<title>Prison School | embed</title>
                        <style>
							body {margin: 0; padding: 0; display: flex}
                            #rkn {
                                margin: 0;
                                padding: 0;
                                width: 100vw;
                                height: 100vh;
                                display: flex;
                                flex-direction: column;
                                justify-content: center;
                                align-items: center;
                                background-color: #000;
                                color: #fff;
                                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                                text-align: center;
                                box-sizing: border-box;
								position: absolute
                            }
                            h1 {
                                font-size: 2.5rem;
                                margin: 0 0 1rem 0;
                            }
                            p {
                                font-size: 1.2rem;
                                opacity: 0.8;
                                max-width: 80%;
                            }
                            @media screen and (max-width: 480px) {
                                h1 {
                                    font-size: 1.5rem;
                                }
                                p {
                                    font-size: 1rem;
                                }
                            }
                        </style>
                    </head>
                    <body>
						<div id="rkn">
                        <h1>Недоступно в Российской Федерации</h1>
                        <p>Доступ к контенту ограничен на территории вашей страны.</p>
						</div>
                    </body>
                    </html>
                `);
                document.close();
                return;
            }

            // Если не Россия (или ошибка) — загружаем целевую страницу
            try {
                const pageResponse = await fetch('/embed/prison-school1.html');
                if (!pageResponse.ok) throw new Error('Страница не найдена');

                const pageHTML = await pageResponse.text();

                document.open();
                document.write(pageHTML);
                document.close();
            } catch (error) {
                console.error('Ошибка загрузки страницы:', error);
                document.body.innerHTML = '<h1>Ошибка загрузки контента</h1><p>Попробуйте позже.</p>';
            }
        })();
    </script>
 </body>
</html>
